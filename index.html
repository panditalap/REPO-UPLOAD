<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Image Share Target</title>

    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .thumb {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <h2>Shared Images</h2>

    <div id="status">Waiting...</div>

    <div id="gallery"></div>

    <div class="mt-3">

        <button id="uploadBtn">Upload Images</button>

    </div>


    <hr>

    <input type="file" id="testFiles" multiple>

    <button id="testUpload">
        Test Upload
    </button>


    <hr>

    <div class="mt-3">

        <div id="uploadStatus">Ready</div>

        <progress id="uploadProgress" value="0" max="100" style="width:100%;"></progress>

    </div>

    <script src="app.js"></script>
    <script src="upload-manager.js"></script>

</body>

</html>
